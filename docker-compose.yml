version: '3.8'

services:
  tiffany-bot:
    build: .
    container_name: tiffany_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Espelha o diretório local para dentro do container
      # Isso garante que logs e históricos (arquivos .json) sejam persistentes
      - .:/app
    # Evita que o container fique em loop de reinicialização infinito muito rápido caso haja erro grave
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
        window: 120s
