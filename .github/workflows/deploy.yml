name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - '*.py'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /opt/tiffany-bot/scripts/deploy.sh
