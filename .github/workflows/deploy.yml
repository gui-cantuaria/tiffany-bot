name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - '*.py'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Debug secrets
        run: |
          echo "VPS_HOST length: ${#VPS_HOST}"
          echo "VPS_SSH_KEY length: ${#VPS_SSH_KEY}"
          echo "VPS_SSH_KEY first 30 chars: ${VPS_SSH_KEY:0:30}"
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /opt/tiffany-bot/scripts/deploy.sh
