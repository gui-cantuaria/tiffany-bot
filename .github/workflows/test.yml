name: Tests

on:
  push:
    branches: [main]
    paths:
      - '*.py'
      - 'test_*.py'
      - 'requirements.txt'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - '*.py'
      - 'test_*.py'
      - 'requirements.txt'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python test_dedup.py
          python test_game_recommendations.py
